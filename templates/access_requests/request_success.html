{% extends 'base.html' %}

{% block title %}Request Submitted{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-xl-6 col-lg-8 col-md-9">
        <div class="card o-hidden border-0 shadow-lg my-5">
            <div class="card-body p-0">
                <div class="p-5 text-center">
                    <div class="mb-4">
                        <i class="fas fa-check-circle text-success" style="font-size: 5rem;"></i>
                    </div>
                    <h1 class="h4 text-gray-900 mb-4">Request Submitted Successfully!</h1>
                    <p class="mb-4">Your access request <strong>{{ request_code }}</strong> has been received.</p>
                    <p class="mb-4">We have sent a confirmation email to the address provided.</p>
                    <a href="{% url 'login' %}" class="btn btn-primary btn-user btn-block">
                        Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
